spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/con
    username: conap1t
    password: ENC(0KF6aOzY1mu90iz6I9Omv5yDAQ94mxsEN0yG2dKnry8=)
    driver-class-name: org.postgresql.Driver
    hikari:
      connectionTimeout: 30000
      maxLifetime: 1800000
      maximum-pool-size: 3
  jpa:
    properties:
      hibernate:
        default_schema: dbo
  task:
    execution:
      thread-name-prefix: MyCustomThreadPool- # 執行緒名稱前綴
      pool:
        core-size: 3 # 核心執行緒數
        max-size: 8 # 最大執行緒數
        queue-capacity: 15 # 佇列容量
        keep-alive: 60s # 執行緒空閒存活時間 (例如：60秒)

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  server:
    port: 8081

